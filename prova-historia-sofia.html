<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova de História — Refazer · Sofia R. Finageiv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     GABARITO E DADOS DA PROVA
     -------------------------
     EDITE AQUI se algum gabarito estiver errado.
     V = Verdadeiro, F = Falso
     A explicação aparece na tela de revisão final.
  ============================================================ */

  /* (Nada de CSS nessa seção — os dados estão em JS no final do arquivo) */

  /* ====================== TOKENS ====================== */
  :root {
    --paper: #f4efe6;
    --paper-shadow: #e6dfd1;
    --ink: #1a1a1a;
    --ink-soft: #4a4540;
    --ink-faded: #8a8378;
    --rule: #d4ccbe;
    --rule-soft: #e8e1d4;
    --red: #b8332a;
    --red-soft: #d65a52;
    --red-bg: #fdeae8;
    --green: #2d6a4f;
    --green-bg: #e8f3ed;
    --gold: #b8860b;
    --accent: #1a3a5c;

    --font-serif: 'Crimson Pro', 'Georgia', serif;
    --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    --font-hand: 'Caveat', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #2a2622;
    background-image:
      radial-gradient(ellipse at top, #3a342e 0%, #1f1c19 100%);
    min-height: 100vh;
    font-family: var(--font-serif);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ====================== LAYOUT BASE ====================== */
  .page-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  .paper {
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(180,160,130,0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(180,160,130,0.08) 0%, transparent 50%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 30px 60px -20px rgba(0,0,0,0.5),
      0 10px 20px -5px rgba(0,0,0,0.3);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 39px,
        rgba(180,150,120,0.04) 39px,
        rgba(180,150,120,0.04) 40px
      );
    pointer-events: none;
  }

  /* furos do fichário */
  .paper::after {
    content: '';
    position: absolute;
    left: 18px;
    top: 0;
    bottom: 0;
    width: 8px;
    background-image:
      radial-gradient(circle, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.08) 40%, transparent 70%);
    background-size: 8px 80px;
    background-repeat: repeat-y;
    background-position: center 60px;
    pointer-events: none;
  }

  .paper-inner {
    padding: 56px 56px 64px 76px;
    position: relative;
  }

  @media (max-width: 640px) {
    .paper-inner { padding: 32px 24px 48px 36px; }
    .paper::after { left: 10px; }
  }

  /* ====================== CABEÇALHO ====================== */
  .header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 24px;
    flex-shrink: 0;
    position: relative;
  }
  .header-logo::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: var(--paper);
    border-radius: 50%;
    right: 8px;
    top: 16px;
  }

  .header-text h1 {
    font-family: var(--font-sans);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--ink);
    line-height: 1.2;
  }
  .header-text .subtitle {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-text .test-name {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ====================== TABELA DE IDENTIFICAÇÃO ====================== */
  .id-table {
    width: 100%;
    border: 1.5px solid var(--ink);
    border-collapse: collapse;
    font-family: var(--font-sans);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .id-table td {
    border: 1px solid var(--ink);
    padding: 8px 12px;
  }
  .id-table .label {
    font-weight: 600;
    color: var(--ink-soft);
    width: 80px;
  }
  .id-table .value {
    font-family: var(--font-hand);
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }

  /* ====================== INSTRUÇÕES ====================== */
  .instructions {
    margin-bottom: 28px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--ink-soft);
  }
  .instructions h3 {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .instructions ol {
    padding-left: 20px;
  }
  .instructions li {
    margin-bottom: 4px;
  }
  .instructions strong {
    color: var(--ink);
  }
  .instructions .signoff {
    margin-top: 14px;
    font-style: italic;
  }

  /* ====================== BLOCO DE QUESTÕES ====================== */
  .test-intro {
    font-family: var(--font-serif);
    font-size: 17px;
    margin-bottom: 24px;
    color: var(--ink);
    line-height: 1.5;
  }

  .question-group {
    margin-bottom: 36px;
  }

  .group-title {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .group-number {
    color: var(--red);
    font-weight: 700;
    margin-right: 6px;
  }
  .group-title em {
    font-style: italic;
  }

  .question {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 14px;
    margin-bottom: 4px;
    border-radius: 4px;
    transition: background-color 0.2s;
    line-height: 1.55;
    font-size: 16px;
  }
  .question:hover {
    background: rgba(180,150,120,0.06);
  }
  .question-id {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink-faded);
    font-weight: 500;
    flex-shrink: 0;
    padding-top: 6px;
    width: 28px;
  }
  .question-text {
    flex: 1;
    color: var(--ink);
  }
  .question-options {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .vf-btn {
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--rule);
    background: transparent;
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vf-btn:hover {
    border-color: var(--ink);
    background: rgba(0,0,0,0.03);
  }
  .vf-btn.selected {
    border-color: var(--red);
    background: var(--red);
    color: white;
    box-shadow: 0 2px 4px rgba(184,51,42,0.3);
  }

  /* ====================== DISSERTATIVA ====================== */
  .dissertativa {
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1.5px dashed var(--rule);
  }
  .dissertativa-intro {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--ink);
  }
  .dissertativa-intro .pen-marker {
    font-family: var(--font-hand);
    font-size: 22px;
    color: var(--red);
    text-decoration: underline;
    text-decoration-color: var(--red-soft);
    text-underline-offset: 4px;
  }

  .diss-block {
    margin-bottom: 28px;
  }
  .diss-block-title {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .diss-block-title em {
    font-style: italic;
  }
  .diss-empty-msg {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-faded);
    font-style: italic;
    padding: 12px 0;
  }
  .diss-falsa-list {
    margin-top: 8px;
  }
  .diss-falsa-item {
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .diss-falsa-item:hover {
    border-color: var(--ink-soft);
    background: rgba(255,255,255,0.7);
  }
  .diss-falsa-item.chosen {
    border-color: var(--red);
    background: var(--red-bg);
  }
  .diss-falsa-radio {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
    position: relative;
  }
  .diss-falsa-item.chosen .diss-falsa-radio {
    border-color: var(--red);
  }
  .diss-falsa-item.chosen .diss-falsa-radio::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--red);
    border-radius: 50%;
  }

  .diss-textarea {
    width: 100%;
    min-height: 80px;
    margin-top: 12px;
    padding: 12px 14px;
    border: none;
    border-bottom: 1.5px solid var(--ink-soft);
    background: transparent;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      var(--rule) 27px,
      var(--rule) 28px
    );
    line-height: 28px;
    font-family: var(--font-hand);
    font-size: 20px;
    color: var(--accent);
    resize: vertical;
    outline: none;
  }
  .diss-textarea:focus {
    border-bottom-color: var(--red);
  }
  .diss-textarea::placeholder {
    color: var(--ink-faded);
    font-style: italic;
    font-size: 16px;
    font-family: var(--font-serif);
  }

  /* ====================== BARRA DE PROGRESSO ====================== */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(0,0,0,0.2);
    z-index: 100;
  }
  .progress-fill {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width 0.3s;
  }

  /* ====================== AÇÕES ====================== */
  .actions {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 2px solid var(--ink);
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .progress-text {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .progress-text strong {
    color: var(--ink);
  }

  .btn {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 36px;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--red);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(184,51,42,0.3);
  }
  .btn-primary:disabled {
    background: var(--ink-faded);
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn-secondary:hover {
    color: var(--ink);
    border-color: var(--ink);
  }

  .save-status {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink-faded);
    margin-top: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ====================== CAPA ====================== */
  .cover {
    text-align: center;
    padding: 60px 20px;
  }
  .cover-eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 20px;
  }
  .cover-title {
    font-family: var(--font-serif);
    font-size: 48px;
    font-weight: 600;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 8px;
    font-style: italic;
  }
  .cover-subtitle {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-bottom: 36px;
  }
  .cover-meta {
    display: inline-grid;
    grid-template-columns: auto auto;
    gap: 8px 20px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 36px;
    text-align: left;
  }
  .cover-meta dt {
    color: var(--ink-faded);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 11px;
    align-self: center;
  }
  .cover-meta dd {
    color: var(--ink);
    font-weight: 500;
  }
  .cover-divider {
    width: 60px;
    height: 2px;
    background: var(--red);
    margin: 0 auto 36px;
  }
  .cover-info {
    background: rgba(255,255,255,0.4);
    border-left: 3px solid var(--red);
    padding: 18px 22px;
    text-align: left;
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 480px;
    margin: 0 auto 36px;
  }
  .cover-info strong {
    color: var(--ink);
  }
  .cover-resume-banner {
    background: var(--green-bg);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 12px 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--green);
    max-width: 480px;
    margin: 0 auto 24px;
  }

  /* ====================== REVISÃO ====================== */
  .review-summary {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 24px 28px;
    margin-bottom: 32px;
    text-align: center;
  }
  .review-summary-eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 8px;
  }
  .review-score {
    font-family: var(--font-serif);
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .review-score .denom {
    color: var(--ink-faded);
    font-weight: 400;
  }
  .review-score-label {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .review-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 16px;
    border-top: 1px solid var(--rule);
    padding-top: 18px;
  }
  @media (max-width: 540px) {
    .review-stats { grid-template-columns: repeat(2, 1fr); }
  }
  .review-stat {
    text-align: center;
  }
  .review-stat-value {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
  }
  .review-stat-label {
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-top: 6px;
  }

  .review-q {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .review-q:last-of-type {
    border-bottom: none;
  }
  .review-q-status {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 700;
    color: white;
    margin-top: 2px;
  }
  .review-q-status.correct { background: var(--green); }
  .review-q-status.wrong { background: var(--red); }
  .review-q-status.skipped { background: var(--ink-faded); }

  .review-q-body {
    flex: 1;
    min-width: 0;
  }
  .review-q-id {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink-faded);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .review-q-text {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .review-q-answers {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    font-family: var(--font-sans);
    font-size: 12px;
  }
  .review-q-answer {
    color: var(--ink-soft);
  }
  .review-q-answer strong {
    font-family: var(--font-serif);
    font-size: 16px;
    margin-left: 6px;
  }
  .review-q-answer.user-correct strong { color: var(--green); }
  .review-q-answer.user-wrong strong { color: var(--red); }
  .review-q-answer.expected strong { color: var(--ink); }
  .review-q-explanation {
    background: rgba(255,255,255,0.5);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    border-radius: 2px;
  }
  .review-q-explanation strong {
    color: var(--ink);
  }

  .review-group-header {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 32px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--ink);
  }
  .review-group-header:first-of-type {
    margin-top: 0;
  }
  .review-group-summary {
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--ink-faded);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .review-diss {
    background: rgba(255,255,255,0.4);
    padding: 14px 18px;
    border-radius: 3px;
    margin-top: 10px;
    border: 1px dashed var(--rule);
  }
  .review-diss-affirm {
    font-family: var(--font-serif);
    font-size: 14px;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .review-diss-answer {
    font-family: var(--font-hand);
    font-size: 19px;
    color: var(--accent);
    line-height: 1.4;
  }
  .review-diss-empty {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-faded);
    font-style: italic;
  }

  /* ====================== UTILITÁRIOS ====================== */
  .hidden { display: none !important; }

  /* impressão */
  @media print {
    body { background: white; }
    .page-wrap { padding: 0; }
    .paper { box-shadow: none; }
    .progress-bar, .actions { display: none; }
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="page-wrap">
  <div class="paper">
    <div class="paper-inner" id="appRoot">
      <!-- conteúdo injetado por JS -->
    </div>
  </div>
</div>

<script>
/* ============================================================================
   DADOS DA PROVA
   ----------------------------------------------------------------------------
   Aqui está o conteúdo que define a prova. Para corrigir o gabarito ou ajustar
   uma explicação, edite os campos `expected` e `explanation` abaixo.
   ============================================================================ */

const PROVA = {
  meta: {
    escola: 'Colégio São Domingos',
    associacao: 'Associação Cultural São Paulo',
    nome: 'Sofia R. Finageiv',
    numero: '31',
    sala: '7-A',
    disciplina: 'História',
    professor: 'Augusto Russo',
    data: '27/03/2026',

/* ============================================================================
   ESTADO E PERSISTÊNCIA
   ============================================================================ */

const STORAGE_KEY = 'prova-historia-sofia-2026-1bim';

function getEmptyState() {
  const respostas = {};
  PROVA.grupos.forEach(g => {
    g.questoes.forEach(q => { respostas[q.id] = null; });
  });
  const dissertativas = {};
  PROVA.grupos.forEach(g => {
    dissertativas[g.id] = { questaoEscolhida: null, texto: '' };
  });
  return {
    iniciada: false,
    finalizada: false,
    tela: 'cover', // cover | prova | review
    respostas,
    dissertativas,
    iniciadaEm: null,
    finalizadaEm: null
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getEmptyState();
    const parsed = JSON.parse(raw);
    // sanity check: garantir que tem todos os campos esperados
    const empty = getEmptyState();
    return { ...empty, ...parsed,
      respostas: { ...empty.respostas, ...(parsed.respostas || {}) },
      dissertativas: { ...empty.dissertativas, ...(parsed.dissertativas || {}) }
    };
  } catch (e) {
    return getEmptyState();
  }
}

let saveTimer = null;
function saveState() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const status = document.getElementById('saveStatus');
      if (status) {
        status.textContent = '✓ Salvo automaticamente';
        status.style.opacity = '1';
        setTimeout(() => { status.style.opacity = '0.5'; }, 1200);
      }
    } catch (e) {
      console.error('Erro ao salvar:', e);
    }
  }, 200);
}

function resetAll() {
  if (!confirm('Tem certeza? Isso vai apagar todas as respostas e começar do zero.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = getEmptyState();
  render();
}

/* ============================================================================
   PROGRESSO
   ============================================================================ */

function getStats() {
  const total = PROVA.grupos.reduce((s, g) => s + g.questoes.length, 0);
  const respondidas = Object.values(state.respostas).filter(r => r !== null).length;
  return { total, respondidas, percent: (respondidas / total) * 100 };
}

function updateProgressBar() {
  const fill = document.getElementById('progressFill');
  if (fill) {
    const { percent } = getStats();
    fill.style.width = percent + '%';
  }
}

function iniciarProva() {

function goProva() {

function goReview() {

function goCover() {

function renderGrupo(grupo, num) {
  return `
    <div class="question-group">
      <h2 class="group-title">
        <span class="group-number">${num}.</span>${grupo.titulo}
      </h2>
      ${grupo.questoes.map(q => renderQuestao(q)).join('')}
    </div>
  `;
}

function renderQuestao(q) {
  const resp = state.respostas[q.id];
  return `
    <div class="question">
      <div class="question-id">${q.id}</div>
      <div class="question-text">${q.texto}</div>
      <div class="question-options">
        <button class="vf-btn ${resp === 'V' ? 'selected' : ''}" onclick="responder('${q.id}', 'V')">V</button>
        <button class="vf-btn ${resp === 'F' ? 'selected' : ''}" onclick="responder('${q.id}', 'F')">F</button>
      </div>
    </div>
  `;
}

function responder(qid, valor) {
  // toggle: se já estava marcado, desmarca
  if (state.respostas[qid] === valor) {
    state.respostas[qid] = null;
  } else {
    state.respostas[qid] = valor;
  }
  saveState();

  // re-renderiza só o que muda, sem perder posição de scroll
  const buttons = document.querySelectorAll(`.question .vf-btn`);
  // mais simples: re-render só dos botões dessa questão
  const allQ = document.querySelectorAll('.question');
  allQ.forEach(qEl => {
    const idEl = qEl.querySelector('.question-id');
    if (!idEl || idEl.textContent.trim() !== qid) return;
    const btns = qEl.querySelectorAll('.vf-btn');
    btns.forEach(b => {
      const v = b.textContent.trim();
      b.classList.toggle('selected', state.respostas[qid] === v);
    });
  });

  // atualiza progresso, dissertativa e botão finalizar
  updateProgressBar();
  updateProgressCount();
  updateDissertativaSection();
  updateFinalizarBtn();
}

function updateProgressCount() {
  const el = document.getElementById('progressCount');
  if (el) el.textContent = getStats().respondidas;
}

function updateFinalizarBtn() {
  const btn = document.getElementById('btnFinalizar');
  if (!btn) return;
  const stats = getStats();
  const ok = stats.respondidas === stats.total;
  btn.disabled = !ok;
  btn.textContent = ok ? 'Finalizar e ver gabarito' : 'Responda todas para finalizar';
}

  return `
    <div class="diss-block" data-group="${grupo.id}">
      <h4 class="diss-block-title">${grupo.tituloCurto}</h4>
      ${falsas.length === 0 ? `
        <div class="diss-empty-msg">
          ${getStats().respondidas < getStats().total
            ? '↑ Termine de responder as questões deste tema para ver as afirmações que você marcou como falsas.'
            : 'Você não marcou nenhuma afirmação como falsa neste tema.'}
        </div>
      ` : `
        <div class="diss-falsa-list">
          ${falsas.map(q => `
            <div class="diss-falsa-item ${escolhida === q.id ? 'chosen' : ''}"
                 onclick="escolherFalsa('${grupo.id}', '${q.id}')">
              <div class="diss-falsa-radio"></div>
              <div><strong style="font-family:var(--font-sans); font-size:11px; color: var(--ink-faded); letter-spacing:1px; display:block; margin-bottom:2px;">${q.id}</strong>${q.texto}</div>
            </div>
          `).join('')}
        </div>
        ${escolhida ? `
          <textarea class="diss-textarea"
                    placeholder="Explique aqui qual é o erro nessa afirmação..."
                    oninput="atualizarDissTexto('${grupo.id}', this.value)">${texto}</textarea>
        ` : ''}
      `}
    </div>
  `;
}

function escolherFalsa(grupoId, qid) {
  state.dissertativas[grupoId].questaoEscolhida = qid;
  saveState();
  updateDissertativaSection();
}

function atualizarDissTexto(grupoId, valor) {
  state.dissertativas[grupoId].texto = valor;
  saveState();
}

function updateDissertativaSection() {
  const sec = document.getElementById('dissertativa');
  if (!sec) return;
  sec.outerHTML = renderDissertativa();
}

/* ============================================================================
   FINALIZAR + REVISÃO
   ============================================================================ */

function finalizarProva() {
  const stats = getStats();
  if (stats.respondidas < stats.total) {
    alert('Responda todas as questões antes de finalizar.');
    return;
  }
  state.finalizada = true;
  state.finalizadaEm = new Date().toISOString();
  state.tela = 'review';
  saveState();
  render();
  window.scrollTo(0, 0);
}

function renderReview() {
  // calcular estatísticas por grupo
  let totalCorretas = 0;
  let totalQuestoes = 0;
  const porGrupo = PROVA.grupos.map(g => {
    const corretas = g.questoes.filter(q => state.respostas[q.id] === q.expected).length;
    totalCorretas += corretas;
    totalQuestoes += g.questoes.length;
    return { grupo: g, corretas };
  });

  return `
    <div class="header">
      <div class="header-logo">S</div>
      <div class="header-text">
        <h1>${PROVA.meta.escola}</h1>
        <div class="subtitle">Gabarito Comentado</div>
        <div class="test-name">Revisão da Prova · ${PROVA.meta.bimestre}</div>
      </div>
    </div>

    <div class="review-summary">
      <div class="review-summary-eyebrow">Resultado de ${PROVA.meta.nome}</div>
      <div class="review-score">${totalCorretas}<span class="denom">/${totalQuestoes}</span></div>
      <div class="review-score-label">questões corretas (${Math.round(totalCorretas / totalQuestoes * 100)}%)</div>
      <div class="review-stats">
        ${porGrupo.map((p, i) => `
          <div class="review-stat">
            <div class="review-stat-value">${p.corretas}/${p.grupo.questoes.length}</div>
            <div class="review-stat-label">Tema ${i + 1}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${porGrupo.map((p, idx) => renderReviewGrupo(p.grupo, idx + 1, p.corretas)).join('')}

    <div class="actions">
      <button class="btn btn-secondary" onclick="window.print()">Imprimir resultado</button>
      <button class="btn btn-secondary" onclick="goCover()">← Voltar à capa</button>
      <button class="btn btn-secondary" onclick="resetAll()">Refazer do zero</button>
    </div>
  `;
}

function renderReviewGrupo(grupo, num, corretas) {
  return `
    <h3 class="review-group-header">${num}. ${grupo.tituloCurto.replace(/^Sobre /, 'Sobre ')}</h3>
    <div class="review-group-summary">${corretas} de ${grupo.questoes.length} corretas</div>
    ${grupo.questoes.map(q => renderReviewQuestao(q)).join('')}
    ${renderReviewDissertativa(grupo)}
  `;
}

function renderReviewQuestao(q) {
  const userAns = state.respostas[q.id];
  const correct = userAns === q.expected;
  const statusClass = correct ? 'correct' : 'wrong';
  const statusIcon = correct ? '✓' : '✗';
  return `
    <div class="review-q">
      <div class="review-q-status ${statusClass}">${statusIcon}</div>
      <div class="review-q-body">
        <div class="review-q-id">Questão ${q.id}</div>
        <div class="review-q-text">${q.texto}</div>
        <div class="review-q-answers">
          <div class="review-q-answer ${correct ? 'user-correct' : 'user-wrong'}">
            Sua resposta: <strong>${userAns || '—'}</strong>
          </div>
          <div class="review-q-answer expected">
            Gabarito: <strong>${q.expected}</strong>
          </div>
        </div>
        <div class="review-q-explanation">
          ${q.explanation}
        </div>
      </div>
    </div>
  `;
}

function renderReviewDissertativa(grupo) {
  const diss = state.dissertativas[grupo.id];
  if (!diss.questaoEscolhida) {
    return `
      <div class="review-diss">
        <div class="review-diss-empty">Parte dissertativa: nenhuma afirmação foi escolhida para correção neste tema.</div>
      </div>
    `;
  }
  const q = grupo.questoes.find(qq => qq.id === diss.questaoEscolhida);
  return `
    <div class="review-diss">
      <div style="font-family: var(--font-sans); font-size:11px; letter-spacing:1px; text-transform:uppercase; color: var(--ink-faded); margin-bottom:8px;">
        ✎ Parte dissertativa · Afirmação ${q.id}
      </div>
      <div class="review-diss-affirm">"${q.texto}"</div>
      ${diss.texto.trim() ? `
        <div class="review-diss-answer">${diss.texto.replace(/</g, '&lt;')}</div>
      ` : `
        <div class="review-diss-empty">(Você escolheu esta afirmação mas não escreveu a correção.)</div>
      `}
      <div style="margin-top:12px; padding-top:10px; border-top:1px solid var(--rule-soft); font-family: var(--font-serif); font-size:13px; color: var(--ink-soft); line-height:1.5;">
        <strong style="color: var(--accent); font-family: var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:4px;">Correção esperada</strong>
        ${q.explanation}
      </div>
    </div>
  `;
}

/* ============================================================================
   ROUTER
   ============================================================================ */

function render() {
  const root = document.getElementById('appRoot');
  if (state.tela === 'cover' || (!state.iniciada && !state.finalizada)) {
    root.innerHTML = renderCover();
  } else if (state.tela === 'review' || state.finalizada) {
    root.innerHTML = renderReview();
  } else {
    root.innerHTML = renderProva();
  }
  updateProgressBar();
}

// inicializar
render();
</script>

</body>
</html>
